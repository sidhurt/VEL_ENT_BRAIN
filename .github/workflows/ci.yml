name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend — install & typecheck
        working-directory: backend
        run: |
          npm ci
          npx tsc --noEmit

      - name: Frontend — install, typecheck & build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build
